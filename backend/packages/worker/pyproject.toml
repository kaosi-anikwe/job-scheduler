[project]
name = "worker"
version = "0.1.0"
description = "Worker process with scheduler, executor, and job handlers for the job scheduler"
requires-python = ">=3.12"
dependencies = [
    "shared"
]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/worker"]
