[project]
name = "api"
version = "0.1.0"
description = "FastAPI application layer for the job scheduler"
requires-python = ">=3.12"
dependencies = [
    "shared",
    "fastapi[standard]>=0.115"
]

[tool.uv.sources]
shared = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/api"]
